s._percentage = value; &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        /// &lt;summary&gt;</span><br><span class="line">        /// 读取地磅的全部信息</span><br><span class="line">        /// &lt;/summary&gt;</span><br><span class="line">        public string Res;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    /// &lt;summary&gt;</span><br><span class="line">    /// 电子称数据读取类</span><br><span class="line">    /// &lt;/summary&gt;</span><br><span class="line">    public class WeightReader : IDisposable</span><br><span class="line">    &#123;</span><br><span class="line">        #region 字段、属性与构造函数</span><br><span class="line"></span><br><span class="line">        public WeightReader()</span><br><span class="line">        &#123;</span><br><span class="line">            try</span><br><span class="line">            &#123;</span><br><span class="line">                ASCIIEncoding aSCII = new ASCIIEncoding(); </span><br><span class="line">                byte[] bt = new byte[] &#123; (byte)2 &#125;;</span><br><span class="line">                string str = aSCII.GetString(bt);</span><br><span class="line"></span><br><span class="line">                sp = new SerialPort();</span><br><span class="line"></span><br><span class="line">                //设置参数</span><br><span class="line">                sp.PortName = &quot;COM1&quot; //通信端口</span><br><span class="line">                sp.BaudRate = &quot;9600&quot; //串行波特率</span><br><span class="line">                sp.DataBits = 8; //每个字节的标准数据位长度</span><br><span class="line">                sp.StopBits = StopBits.One; //设置每个字节的标准停止位数</span><br><span class="line">                sp.Parity = Parity.None; //设置奇偶校验检查协议</span><br><span class="line">                sp.ReadTimeout = 3000; //单位毫秒</span><br><span class="line">                sp.WriteTimeout = 3000; //单位毫秒</span><br><span class="line">                //串口控件成员变量，字面意思为接收字节阀值，</span><br><span class="line">                //串口对象在收到这样长度的数据之后会触发事件处理函数</span><br><span class="line">                //一般都设为1</span><br><span class="line">                sp.ReceivedBytesThreshold = 1; </span><br><span class="line">                sp.Handshake = Handshake.RequestToSend;  </span><br><span class="line">                this.Speed = Speed;</span><br><span class="line">                if (!sp.IsOpen)</span><br><span class="line">                &#123;</span><br><span class="line">                    sp.Open();</span><br><span class="line">                &#125; </span><br><span class="line">            &#125;</span><br><span class="line">            catch</span><br><span class="line">            &#123;</span><br><span class="line">                LogHelper.WriteErrorLog(string.Format(&quot;无法初始化串口&#123;0&#125;!&quot;, ConfigurationManager.AppSettings[&quot;PortName&quot;])); </span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        SerialPort sp;</span><br><span class="line">        int _speed = 300;</span><br><span class="line"></span><br><span class="line">        /// &lt;summary&gt;</span><br><span class="line">        /// 获取或设置电脑取COM数据缓冲时间，单位毫秒</span><br><span class="line">        /// &lt;/summary&gt;</span><br><span class="line">        public int Speed</span><br><span class="line">        &#123;</span><br><span class="line">            get &#123; return this._speed; &#125;</span><br><span class="line">            set</span><br><span class="line">            &#123;</span><br><span class="line">                if (value &lt; 300)</span><br><span class="line">                    throw new Exception(&quot;串口读取缓冲时间不能小于300毫秒!&quot;);</span><br><span class="line">                this._speed = value;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        public bool InitCom(string PortName)</span><br><span class="line">        &#123;</span><br><span class="line">            return this.InitCom(PortName, 4800, 300);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        /// &lt;summary&gt;</span><br><span class="line">        /// 初始化串口</span><br><span class="line">        /// &lt;/summary&gt;</span><br><span class="line">        /// &lt;param name=&quot;PortName&quot;&gt;数据传输端口&lt;/param&gt;</span><br><span class="line">        /// &lt;param name=&quot;BaudRate&quot;&gt;波特率&lt;/param&gt;</span><br><span class="line">        /// &lt;param name=&quot;Speed&quot;&gt;串口读数缓冲时间&lt;/param&gt;</span><br><span class="line">        /// &lt;returns&gt;&lt;/returns&gt;</span><br><span class="line">        public bool InitCom(string PortName, int BaudRate, int Speed)</span><br><span class="line">        &#123;</span><br><span class="line">            try</span><br><span class="line">            &#123;</span><br><span class="line">                sp = new SerialPort(PortName, BaudRate, Parity.None, 8);</span><br><span class="line">                sp.ReceivedBytesThreshold = 10;</span><br><span class="line">                sp.Handshake = Handshake.RequestToSend;</span><br><span class="line">                sp.Parity = Parity.None;</span><br><span class="line">                sp.ReadTimeout = 600;</span><br><span class="line">                sp.WriteTimeout = 600;</span><br><span class="line">                this.Speed = Speed;</span><br><span class="line">                if (!sp.IsOpen)</span><br><span class="line">                &#123;</span><br><span class="line">                    sp.Open();</span><br><span class="line">                &#125;</span><br><span class="line">                return true;</span><br><span class="line">            &#125;</span><br><span class="line">            catch</span><br><span class="line">            &#123;</span><br><span class="line">                throw new Exception(string.Format(&quot;无法初始化串口&#123;0&#125;!&quot;, PortName));</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        #endregion</span><br><span class="line"></span><br><span class="line">        #region 串口数据读取方法</span><br><span class="line"></span><br><span class="line">        public WeightInformation ReadInfo()</span><br><span class="line">        &#123;</span><br><span class="line">            try</span><br><span class="line">            &#123;</span><br><span class="line">                string src = this.ReadCom();</span><br><span class="line">                LogHelper.WriteLog(src);</span><br><span class="line">                WeightInformation info = new WeightInformation();</span><br><span class="line">                info.WData = this.DecodeWeightData(src);</span><br><span class="line">                info.WUnit = this.DecodeWeightUnit(src);</span><br><span class="line">                info.Percentage = this.DecodePercentage(src);</span><br><span class="line">                info.QData = this.DecodeQualityData(src);</span><br><span class="line">                info.QUnit = this.DecodeQualityUnit(src);</span><br><span class="line">                info.Res = src;</span><br><span class="line">                return info;</span><br><span class="line">            &#125;</span><br><span class="line">            catch (Exception e)</span><br><span class="line">            &#123;</span><br><span class="line">                LogHelper.WriteErrorLog(e);</span><br><span class="line">                throw e;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        /// &lt;summary&gt;</span><br><span class="line">        /// 将COM口缓存数据全部读取</span><br><span class="line">        /// &lt;/summary&gt;</span><br><span clas  class="line">            &#123;</span><br><span class="line">                if (sp != null &amp;&amp; sp.IsOpen)</span><br><span class="line">                &#123;</span><br><span class="line">                    sp.Close();</span><br><span class="line">                    LogHelper.WriteLog(&quot;串口已关闭&quot;);</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">            return &quot;&quot;;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        #endregion</span><br><span class="line"></span><br><span class="line">        #region  基本取数方法</span><br><span class="line"></span><br><span class="line">        /// &lt;summary&gt;</span><br><span class="line">        /// 从字符串中取值</span><br><span class="line">        /// &lt;/summary&gt;</span><br><span class="line">        /// &lt;param name=&quot;head&quot;&gt;起始字符串&lt;/param&gt;</span><br><span class="line">        /// &lt;param name=&quot;intervalLen&quot;&gt;间隔位长度&lt;/param&gt;</span><br><span class="line">        /// &lt;param name=&quot;valueLen&quot;&gt;值长度&lt;/param&gt;</span><br><span class="line">        /// &lt;param name=&quot;src&quot;&gt;源字符串&lt;/param&gt;</span><br><span class="line">        /// &lt;returns&gt;&lt;/returns&gt;</span><br><span class="line">        private string DecodeValue(string head, int intervalLen, int valueLen, string src)</span><br><span class="line">        &#123;</span><br><span class="line">            int index = src.IndexOf(head);</span><br><span class="line">            return src.Substring(index + intervalLen, valueLen);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        /// &lt;summary&gt;</span><br><span class="line">        /// 取重量</span><br><span class="line">        /// &lt;/summary&gt;</span><br><span class="line">        /// &lt;param name=&quot;srcString&quot;&gt;源字符串&lt;/param pan><br><span class="line">        private string DecodeQualityData(string srcString)</span><br><span class="line">        &#123;</span><br><span class="line">            return this.DecodeValue(&quot;PCS&quot;, 3, 9, srcString);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        /// &lt;summary&gt;</span><br><span class="line">        /// 取数量单位</span><br><span class="line">        /// &lt;/summary&gt;</span><br><span class="line">        /// &lt;param name=&quot;srcString&quot;&gt;源字符串&lt;/param&gt;</span><br><span class="line">        /// &lt;returns&gt;&lt;/returns&gt;</span><br><span class="line">        private string DecodeQualityUnit(string srcString)</span><br><span class="line">        &#123;</span><br><span class="line">            return this.DecodeValue(&quot;PCS&quot;, 12, 3, srcString);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        #endregion</span><br><span class="line"></span><br><span class="line">        #region 释放所有资源</span><br><span class="line"></span><br><span class="line">        public void Dispose()</span><br><span class="line">        &#123;</span><br><span class="line">            if (sp != null &amp;&amp; sp.IsOpen)</span><br><span class="line">            &#123;</span><br><span class="line">                sp.Close();</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        #endregion</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

  <script type="text/javascript">
    // Popup Window;
    var isfetched = false;
    var isXml = true;
    // Search DB path;
    var search_path = "search.xml";
    if (search_path.length === 0) {
      search_path = "search.xml";
    } else if (/json$/i.test(search_path)) {
      isXml = false;
    }
    var path = "/" + search_path;
    // monitor main search box;

    var onPopupClose = function (e) {
      $('.popup').hide();
      $('#local-search-input').val('');
      $('.search-result-list').remove();
      $('#no-result').remove();
      $(".local-search-pop-overlay").remove();
      $('body').css('overflow', '');
    }

    function proceedsearch() {
      $("body")
        .append('<div class="search-popup-overlay local-search-pop-overlay"></div>')
        .css('overflow', 'hidden');
      $('.search-popup-overlay').click(onPopupClose);
      $('.popup').toggle();
      var $localSearchInput = $('#local-search-input');
      $localSearchInput.attr("autocapitalize", "none");
      $localSearchInput.attr("autocorrect", "off");
      $localSearchInput.focus();
    }

    // search function;
    var searchFunc = function(path, search_id, content_id) {
      'use strict';

      // start loading animation
      $("body")
        .append('<div class="search-popup-overlay local-search-pop-overlay">' +
          '<div id="search-loading-icon">' +
          '<i class="fa fa-spinner fa-pulse fa-5x fa-fw"></i>' +
          '</div>' +
          '</div>')
        .css('overflow', 'hidden');
      $("#search-loading-icon").css('margin', '20% auto 0 auto').css('text-align', 'center');

      $.ajax({
        url: path,
        dataType: isXml ? "xml" : "json",
        async: true,
        success: function(res) {
          // get the contents from search data
          isfetched = true;
          $('.popup').detach().appendTo('.header-inner');
          var datas = isXml ? $("entry", res).map(function() {
            return {
              title: $("title", this).text(),
              content: $("content",this).text(),
              url: $("url" , this).text()
            };
          }).get() : res;
          var input = document.getElementById(search_id);
          var resultContent = document.getElementById(content_id);
          var inputEventFunction = function() {
            var searchText = input.value.trim().toLowerCase();
            var keywords = searchText.split(/[\s\-]+/);
            if (keywords.length > 1) {
              keywords.push(searchText);
            }
            var resultItems = [];
            if (searchText.length > 0) {
              // perform local searching
              datas.forEach(function(data) {
                var isMatch = false;
                var hitCount = 0;
                var searchTextCount = 0;
                var title = data.title.trim();
                var titleInLowerCase = title.toLowerCase();
                var content = data.content.trim().replace(/<[^>]+>/g,"");
                var contentInLowerCase = content.toLowerCase(); 
				//var articleUrl = decodeURIComponent(data.url);
				var articleUrl = decodeURIComponent(data.url).substring(1);//截取第一位/斜杠
                var indexOfTitle = [];
                var indexOfContent = [];
                // only match articles with not empty titles
                if(title != '') {
                  keywords.forEach(function(keyword) {
                    function getIndexByWord(word, text, caseSensitive) {
                      var wordLen = word.length;
                      if (wordLen === 0) {
                        return [];
                      }
                      var startPosition = 0, position = [], index = [];
                      if (!caseSensitive) {
                        text = text.toLowerCase();
                        word = word.toLowerCase();
                      }
                      while ((position = text.indexOf(word, startPosition)) > -1) {
                        index.push({position: position, word: word});
                        startPosition = position + wordLen;
                      }
                      return index;
                    }

                    indexOfTitle = indexOfTitle.concat(getIndexByWord(keyword, titleInLowerCase, false));
                    indexOfContent = indexOfContent.concat(getIndexByWord(keyword, contentInLowerCase, false));
                  });
                  if (indexOfTitle.length > 0 || indexOfContent.length > 0) {
                    isMatch = true;
                    hitCount = indexOfTitle.length + indexOfContent.length;
                  }
                }

                // show search results

                if (isMatch) {
                  // sort index by position of keyword

                  [indexOfTitle, indexOfContent].forEach(function (index) {
                    index.sort(function (itemLeft, itemRight) {
                      if (itemRight.position !== itemLeft.position) {
                        return itemRight.position - itemLeft.position;
                      } else {
                        return itemLeft.word.length - itemRight.word.length;
                      }
                    });
                  });

                  // merge hits into slices

                  function mergeIntoSlice(text, start, end, index) {
                    var item = index[index.length - 1];
                    var position = item.position;
                    var word = item.word;
                    var hits = [];
                    var searchTextCountInSlice = 0;
                    while (position + word.length <= end && index.length != 0) {
                      if (word === searchText) {
                        searchTextCountInSlice++;
                      }
                      hits.push({position: position, length: word.length});
                      var wordEnd = position + word.length;

                      // move to next position of hit

                      index.pop();
                      while (index.length != 0) {
                        item = index[index.length - 1];
                        position = item.position;
                        word = item.word;
                        if (wordEnd > position) {
                          index.pop();
                        } else {
                          break;
                        }
                      }
                    }
                    searchTextCount += searchTextCountInSlice;
                    return {
                      hits: hits,
                      start: start,
                      end: end,
                      searchTextCount: searchTextCountInSlice
                    };
                  }

                  var slicesOfTitle = [];
                  if (indexOfTitle.length != 0) {
                    slicesOfTitle.push(mergeIntoSlice(title, 0, title.length, indexOfTitle));
                  }

                  var slicesOfContent = [];
                  while (indexOfContent.length != 0) {
                    var item = indexOfContent[indexOfContent.length - 1];
                    var position = item.position;
                    var word = item.word;
                    // cut out 100 characters
                    var start = position - 20;
                    var end = position + 80;
                    if(start < 0){
                      start = 0;
                    }
                    if (end < position + word.length) {
                      end = position + word.length;
                    }
                    if(end > content.length){
                      end = content.length;
                    }
                    slicesOfContent.push(mergeIntoSlice(content, start, end, indexOfContent));
                  }

                  // sort slices in content by search text's count and hits' count

                  slicesOfContent.sort(function (sliceLeft, sliceRight) {
                    if (sliceLeft.searchTextCount !== sliceRight.searchTextCount) {
                      return sliceRight.searchTextCount - sliceLeft.searchTextCount;
                    } else if (sliceLeft.hits.length !== sliceRight.hits.length) {
                      return sliceRight.hits.length - sliceLeft.hits.length;
                    } else {
                      return sliceLeft.start - sliceRight.start;
                    }
                  });

                  // select top N slices in content

                  var upperBound = parseInt('1');
                  if (upperBound >= 0) {
                    slicesOfContent = slicesOfContent.slice(0, upperBound);
                  }

                  // highlight title and content

                  function highlightKeyword(text, slice) {
                    var result = '';
                    var prevEnd = slice.start;
                    slice.hits.forEach(function (hit) {
                      result += text.substring(prevEnd, hit.position);
                      var end = hit.position + hit.length;
                      result += '<b class="search-keyword">' + text.substring(hit.position, end) + '</b>';
                      prevEnd = end;
                    });
                    result += text.substring(prevEnd, slice.end);
                    return result;
                  }

                  var resultItem = '';

                  if (slicesOfTitle.length != 0) {
                    resultItem += "<li><a href='" + articleUrl + "' class='search-result-title'>" + highlightKeyword(title, slicesOfTitle[0]) + "</a>";
                  } else {
                    resultItem += "<li><a href='" + articleUrl + "' class='search-result-title'>" + title + "</a>";
                  }

                  slicesOfContent.forEach(function (slice) {
                    resultItem += "<a href='" + articleUrl + "'>" +
                      "<p class=\"search-result\">" + highlightKeyword(content, slice) +
                      "...</p>" + "</a>";
                  });

                  resultItem += "</li>";
                  resultItems.push({
                    item: resultItem,
                    searchTextCount: searchTextCount,
                    hitCount: hitCount,
                    id: resultItems.length
                  });
                }
              })
            };
            if (keywords.length === 1 && keywords[0] === "") {
              resultContent.innerHTML = '<div id="no-result"><i class="fa fa-search fa-5x" /></div>'
            } else if (resultItems.length === 0) {
              resultContent.innerHTML = '<div id="no-result"><i class="fa fa-frown-o fa-5x" /></div>'
            } else {
              resultItems.sort(function (resultLeft, resultRight) {
                if (resultLeft.searchTextCount !== resultRight.searchTextCount) {
                  return resultRight.searchTextCount - resultLeft.searchTextCount;
                } else if (resultLeft.hitCount !== resultRight.hitCount) {
                  return resultRight.hitCount - resultLeft.hitCount;
                } else {
                  return resultRight.id - resultLeft.id;
                }
              });
              var searchResultList = '<ul class=\"search-result-list\">';
              resultItems.forEach(function (result) {
                searchResultList += result.item;
              })
              searchResultList += "</ul>";
              resultContent.innerHTML = searchResultList;
            }
          }

          if ('auto' === 'auto') {
            input.addEventListener('input', inputEventFunction);
          } else {
            $('.search-icon').click(inputEventFunction);
            input.addEventListener('keypress', function (event) {
              if (event.keyCode === 13) {
                inputEventFunction();
              }
            });
          }

          // remove loading animation
          $(".local-search-pop-overlay").remove();
          $('body').css('overflow', '');

          proceedsearch();
        }
      });
    }

    // handle and trigger popup window;
    $('.popup-trigger').click(function(e) {
      e.stopPropagation();
      if (isfetched === false) {
        searchFunc(path, 'local-search-input', 'local-search-result');
      } else {
        proceedsearch();
      };
    });

    $('.popup-btn-close').click(onPopupClose);
    $('.popup').click(function(e){
      e.stopPropagation();
    });
    $(document).on('keyup', function (event) {
      var shouldDismissSearchPopup = event.which === 27 &&
        $('.search-popup').is(':visible');
      if (shouldDismissSearchPopup) {
        onPopupClose();
      }
    });
  </script>
